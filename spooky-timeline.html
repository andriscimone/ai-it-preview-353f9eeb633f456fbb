<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta name="theme-color" content="#050706" />
    <title>spooky timeline, not so distant</title>
    <style>
      html { background: #050706; }
      html:not([data-secret-access="granted"]) body { visibility: hidden; }
    </style>
    <script>
      (() => {
        try {
          const grantedAt = Number(sessionStorage.getItem("aiit-spooky-pass"));
          sessionStorage.removeItem("aiit-spooky-pass");
          if (grantedAt && Date.now() - grantedAt < 10000) {
            document.documentElement.dataset.secretAccess = "granted";
            return;
          }
        } catch (_) {}
        window.location.replace("index.html#tesi");
      })();
    </script>
    <link rel="stylesheet" href="spooky-timeline.css?v=s2" />
  </head>
  <body>
    <h1>spooky timeline, <em>not so distant</em></h1>
  </body>
</html>
